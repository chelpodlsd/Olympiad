<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Международная олимпиада</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        
        /* КРАСИВЫЙ ПЕРЕЛИВАЮЩИЙСЯ ФОН */
        body {
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab, #f1c40f, #9b59b6, #e74c3c, #1abc9c);
            background-size: 400% 400%;
            animation: gradient 10s ease infinite;
            transition: background 0.5s;
        }
        
        body.loser-bg {
            background: linear-gradient(-45deg, #ff0000, #c0392b, #e74c3c, #ff4d4d, #ff6b6b, #ff0000);
            background-size: 400% 400%;
            animation: gradient 3s ease infinite;
        }
        
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* КОНТЕЙНЕР - оптимальные отступы для мобилок */
        .container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 20px 15px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3), 0 0 0 2px rgba(255,255,255,0.5);
            animation: slideIn 0.8s ease-out;
            border: 1px solid rgba(255,255,255,0.5);
            position: relative;
            z-index: 10;
            margin: 5px;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        /* ЗАГОЛОВОК - МЕЛЬЧЕ НА ТЕЛЕФОНЕ */
        h1 {
            text-align: center;
            font-size: 24px; /* Фиксированный размер для мобилок */
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0,0,0,0.3), 0 0 20px rgba(255,215,0,0.5);
            background: linear-gradient(135deg, gold, orange, red, purple, blue);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleGlow 2s ease-in-out infinite;
            line-height: 1.2;
            white-space: nowrap; /* Запрещаем перенос */
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 5px;
        }
        
        /* Для больших экранов */
        @media (min-width: 768px) {
            h1 {
                font-size: 42px;
                white-space: normal;
            }
        }
        
        @media (min-width: 1024px) {
            h1 {
                font-size: 48px;
            }
        }
        
        @keyframes titleGlow {
            0%, 100% { filter: drop-shadow(0 0 5px gold); }
            50% { filter: drop-shadow(0 0 15px gold) drop-shadow(0 0 30px orange); }
        }
        
        /* ФОРМА - компактнее */
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
            text-shadow: 0 1px 2px rgba(255,255,255,0.5);
            padding-left: 5px;
        }
        
        input {
            width: 100%;
            padding: 12px 18px;
            border: none;
            border-radius: 40px;
            font-size: 14px;
            background: rgba(255,255,255,0.95);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1), inset 0 1px 4px rgba(255,255,255,1);
            transition: all 0.3s;
            border: 2px solid transparent;
            -webkit-appearance: none;
        }
        
        /* КНОПКА - меньше на мобилке */
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #FFD700, #FFA500, #FF4500);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3), 0 0 20px rgba(255,215,0,0.5);
            letter-spacing: 1px;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* РЕЗУЛЬТАТ - компактнее */
        .result {
            margin-top: 20px;
            padding: 20px 15px;
            border-radius: 25px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            display: none;
            animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: 3px solid rgba(255,255,255,0.5);
            position: relative;
            z-index: 20;
            word-break: break-word;
        }
        
        @media (min-width: 768px) {
            .result {
                font-size: 28px;
                padding: 25px;
            }
        }
        
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        /* Конфетти - меньше на мобилке */
        .confetti {
            position: fixed;
            width: 8px;
            height: 12px;
            background: gold;
            animation: confettiFall 3s linear infinite;
            pointer-events: none;
            z-index: 1000;
            border-radius: 2px;
        }
        
        @media (min-width: 768px) {
            .confetti {
                width: 12px;
                height: 20px;
            }
        }
        
        @keyframes confettiFall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0.5;
            }
        }
        
        /* ПАЛЬЦЫ ВНИЗ - меньше на мобилке */
        .thumbs-down {
            position: fixed;
            font-size: 24px;
            animation: thumbsDownFall 3s linear forwards;
            pointer-events: none;
            z-index: 5;
            user-select: none;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        
        @media (min-width: 768px) {
            .thumbs-down {
                font-size: 35px;
            }
        }
        
        @keyframes thumbsDownFall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
        
        /* Стили для результатов */
        .result.winner {
            background: linear-gradient(135deg, gold, orange);
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            box-shadow: 0 0 30px gold, 0 0 60px orange;
            border: 3px solid white;
        }
        
        .result.loser {
            background: linear-gradient(135deg, #333, #000);
            color: white;
            box-shadow: 0 0 30px red;
            border: 3px solid red;
        }
        
        .result.prize {
            background: linear-gradient(135deg, #84fab0, #8fd3f4);
            color: #333;
            border: 3px solid white;
        }
        
        /* Эмодзи - адаптивные */
        .emoji-large {
            font-size: 40px;
            margin: 5px 0;
            animation: bounce 1s infinite;
        }
        
        @media (min-width: 768px) {
            .emoji-large {
                font-size: 70px;
                margin: 10px 0;
            }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        /* Контейнер для эмодзи в "ты лох" */
        .thumbs-container {
            font-size: 35px;
            animation: shake 0.5s infinite;
        }
        
        @media (min-width: 768px) {
            .thumbs-container {
                font-size: 60px;
            }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        /* Заметка о подарке - компактнее */
        .gift-note {
            font-size: 14px;
            margin-top: 12px;
            padding: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 40px;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 2px solid white;
            word-break: break-word;
        }
        
        @media (min-width: 768px) {
            .gift-note {
                font-size: 20px;
                padding: 15px;
            }
        }
        
        /* Номер телефона - компактнее */
        .phone-number {
            font-size: 16px;
            font-weight: bold;
            color: gold;
            text-shadow: 2px 2px 4px black;
            animation: pulse 1s infinite;
            display: inline-block;
            word-break: break-word;
        }
        
        @media (min-width: 768px) {
            .phone-number {
                font-size: 28px;
            }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        /* Радужный текст - компактнее */
        .rainbow-text {
            background: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 28px;
            animation: rainbow 2s linear infinite;
            line-height: 1.2;
        }
        
        @media (min-width: 768px) {
            .rainbow-text {
                font-size: 48px;
            }
        }
        
        @keyframes rainbow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }
        
        /* Дополнительный текст */
        .small-text {
            font-size: 12px;
            margin-top: 8px;
        }
        
        @media (min-width: 768px) {
            .small-text {
                font-size: 16px;
            }
        }
        
        /* Фикс для iPhone */
        @supports (-webkit-touch-callout: none) {
            body {
                min-height: -webkit-fill-available;
            }
            
            input, button {
                -webkit-appearance: none;
                border-radius: 40px;
            }
        }
        
        /* Для очень маленьких экранов (iPhone SE) */
        @media (max-width: 375px) {
            .container {
                padding: 15px 12px;
            }
            
            h1 {
                font-size: 20px;
            }
            
            button {
                font-size: 16px;
                padding: 12px;
            }
            
            .result {
                padding: 15px 10px;
                font-size: 18px;
            }
            
            .gift-note {
                font-size: 12px;
            }
            
            .phone-number {
                font-size: 14px;
            }
        }
        
        /* Для больших экранов */
        @media (min-width: 1024px) {
            .container {
                padding: 40px;
            }
            
            h1 {
                font-size: 48px;
            }
            
            button {
                font-size: 24px;
                padding: 18px;
            }
            
            .result {
                font-size: 32px;
                padding: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 МЕЖДУНАРОДНАЯ ОЛИМПИАДА 2026 🏆</h1>
        
        <div class="form-group">
            <label>📝 ФИО:</label>
            <input type="text" id="fio" placeholder="Введите ваше ФИО">
        </div>
        
        <div class="form-group">
            <label>📧 Email:</label>
            <input type="email" id="email" placeholder="Введите ваш email">
        </div>
        
        <button onclick="checkWinner()">⭐ УЗНАТЬ РЕЗУЛЬТАТ ⭐</button>
        
        <div id="result" class="result"></div>
    </div>

    <script>
        // Данные победителя
        const WINNER_EMAIL = "Mashapiro192@gmail.com";
        const WINNER_NAME = "Шапиро Мария Александровна";
        const WINNER_PHONE = "8-964-522-66-80";
        
        const prizes = [
            "ПОБЕДИТЕЛЬ",
            "2 МЕСТО",
            "3 МЕСТО",
            "ПРИЗЁР",
            "ТЫ ЛОХ 😂"
        ];
        
        // Функция для сравнения без учета регистра
        function compareIgnoreCase(str1, str2) {
            if (!str1 || !str2) return false;
            return str1.toLowerCase().trim() === str2.toLowerCase().trim();
        }
        
        // Функция для создания фанфар
        function createFanfares() {
            const colors = ['gold', 'red', 'blue', 'green', 'purple', 'orange', 'pink', 'yellow'];
            // Меньше конфетти на мобилке
            const count = window.innerWidth < 600 ? 50 : 120;
            
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.width = (Math.random() * 8 + 5) + 'px';
                    confetti.style.height = (Math.random() * 12 + 8) + 'px';
                    confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => {
                        confetti.remove();
                    }, 4000);
                }, i * 20);
            }
        }
        
        // Функция для создания пальцев вниз
        function createThumbsDown() {
            const thumbsDownEmojis = ['👎', '👎🏼', '👎🏽', '👎🏾', '👎🏿', '👇', '😒', '💩'];
            
            document.body.classList.remove('loser-bg');
            document.body.classList.add('loser-bg');
            
            // Меньше пальцев на мобилке
            const count = window.innerWidth < 600 ? 30 : 70;
            
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const thumb = document.createElement('div');
                    thumb.className = 'thumbs-down';
                    thumb.style.left = Math.random() * 100 + 'vw';
                    thumb.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    thumb.style.fontSize = (Math.random() * 15 + 20) + 'px';
                    thumb.style.opacity = Math.random() * 0.8 + 0.2;
                    thumb.innerHTML = thumbsDownEmojis[Math.floor(Math.random() * thumbsDownEmojis.length)];
                    document.body.appendChild(thumb);
                    
                    setTimeout(() => {
                        thumb.remove();
                    }, 4000);
                }, i * 30);
            }
            
            setTimeout(() => {
                document.body.classList.remove('loser-bg');
            }, 5000);
        }
        
        function checkWinner() {
            const fio = document.getElementById('fio').value.trim();
            const email = document.getElementById('email').value.trim();
            const resultDiv = document.getElementById('result');
            
            if (!fio || !email) {
                alert('Пожалуйста, заполните все поля! 👆');
                return;
            }
            
            // Удаляем старые эффекты
            document.querySelectorAll('.confetti, .thumbs-down').forEach(el => el.remove());
            document.body.classList.remove('loser-bg');
            
            // Проверка победителя без учета регистра
            if (compareIgnoreCase(email, WINNER_EMAIL) && compareIgnoreCase(fio, WINNER_NAME)) {
                resultDiv.style.display = 'block';
                resultDiv.className = 'result winner';
                resultDiv.innerHTML = `
                    <div class="emoji-large">🏆👑🏆</div>
                    <div>ПОБЕДИТЕЛЬ</div>
                    <div class="gift-note">
                        Обратитесь за подарком по номеру:<br>
                        <span class="phone-number">${WINNER_PHONE}</span>
                    </div>
                    <div class="small-text">✨ АДМИНИСТРАТОР УЖЕ ЗНАЕТ ✨</div>
                `;
                createFanfares();
                
            } else {
                const randomIndex = Math.floor(Math.random() * prizes.length);
                const result = prizes[randomIndex];
                
                resultDiv.style.display = 'block';
                
                if (result === "ТЫ ЛОХ 😂") {
                    resultDiv.className = 'result loser';
                    resultDiv.innerHTML = `
                        <div class="thumbs-container">👎👎👎</div>
                        <div class="rainbow-text">ТЫ ЛОХ</div>
                        <div style="font-size: clamp(30px, 10vw, 60px); margin: 5px 0;">😂🤣😭</div>
                        <div class="small-text">ПОПРОБУЙ ЕЩЁ РАЗ!</div>
                    `;
                    createThumbsDown();
                    
                } else if (result === "2 МЕСТО" || result === "3 МЕСТО") {
                    resultDiv.className = 'result prize';
                    resultDiv.innerHTML = `
                        <div class="emoji-large">🎉</div>
                        <div style="font-size: clamp(22px, 6vw, 40px);">${result}</div>
                        <div class="small-text">ПОЗДРАВЛЯЕМ!</div>
                    `;
                    createFanfares();
                    
                } else if (result === "ПРИЗЁР") {
                    resultDiv.className = 'result prize';
                    resultDiv.innerHTML = `
                        <div class="emoji-large">🏅</div>
                        <div style="font-size: clamp(22px, 6vw, 40px);">ПРИЗЁР</div>
                        <div class="small-text">ВЫ МОЛОДЕЦ!</div>
                    `;
                    
                } else {
                    resultDiv.className = 'result prize';
                    resultDiv.innerHTML = `
                        <div class="emoji-large">⭐</div>
                        <div style="font-size: clamp(22px, 6vw, 40px);">${result}</div>
                    `;
                }
            }
            
            resultDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkWinner();
            }
        });
        
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>

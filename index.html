<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Международная олимпиада</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        /* Переливающийся градиентный фон */
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 10s ease infinite;
        }
        
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* Стеклянный контейнер */
        .container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 50px;
            max-width: 650px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3), 0 0 0 2px rgba(255,255,255,0.5);
            animation: slideIn 0.8s ease-out;
            border: 1px solid rgba(255,255,255,0.5);
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        h1 {
            text-align: center;
            color: #fff;
            font-size: 48px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(0,0,0,0.3), 0 0 20px rgba(255,215,0,0.5);
            background: linear-gradient(135deg, gold, orange, red, purple, blue);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleGlow 2s ease-in-out infinite;
        }
        
        @keyframes titleGlow {
            0%, 100% { filter: drop-shadow(0 0 5px gold); }
            50% { filter: drop-shadow(0 0 20px gold) drop-shadow(0 0 40px orange); }
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
            font-size: 18px;
            text-shadow: 0 1px 2px rgba(255,255,255,0.5);
        }
        
        input {
            width: 100%;
            padding: 15px 20px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            background: rgba(255,255,255,0.9);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2), inset 0 1px 4px rgba(255,255,255,1);
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        input:focus {
            outline: none;
            border-color: gold;
            box-shadow: 0 5px 20px rgba(255,215,0,0.5);
            transform: scale(1.02);
        }
        
        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #FFD700, #FFA500, #FF4500);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3), 0 0 20px rgba(255,215,0,0.5);
            letter-spacing: 2px;
        }
        
        button:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4), 0 0 30px gold;
        }
        
        button:active {
            transform: translateY(2px);
        }
        
        .result {
            margin-top: 40px;
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            font-size: 36px;
            font-weight: bold;
            display: none;
            animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: 3px solid rgba(255,255,255,0.5);
        }
        
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        /* Конфетти (фанфары) */
        .confetti {
            position: fixed;
            width: 15px;
            height: 25px;
            background: gold;
            animation: confettiFall 3s linear infinite;
            pointer-events: none;
            z-index: 1000;
            border-radius: 3px;
        }
        
        @keyframes confettiFall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0.5;
            }
        }
        
        /* Дизлайки */
        .dislike {
            position: fixed;
            font-size: 40px;
            animation: dislikeFall 2s linear forwards;
            pointer-events: none;
            z-index: 1000;
        }
        
        @keyframes dislikeFall {
            0% {
                transform: translateY(-50px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
        
        .result.winner {
            background: linear-gradient(135deg, gold, orange);
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            box-shadow: 0 0 50px gold, 0 0 100px orange;
            border: 3px solid white;
        }
        
        .result.loser {
            background: linear-gradient(135deg, #333, #000);
            color: white;
            box-shadow: 0 0 30px red;
        }
        
        .result.prize {
            background: linear-gradient(135deg, #84fab0, #8fd3f4);
            color: #333;
            border: 3px solid white;
        }
        
        .emoji-large {
            font-size: 80px;
            margin: 20px 0;
            animation: bounce 1s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .gift-note {
            font-size: 24px;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.2);
            border-radius: 50px;
            backdrop-filter: blur(5px);
            border: 2px solid white;
        }
        
        .phone-number {
            font-size: 32px;
            font-weight: bold;
            color: gold;
            text-shadow: 2px 2px 4px black;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .rainbow-text {
            background: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 48px;
            animation: rainbow 2s linear infinite;
        }
        
        @keyframes rainbow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }
        
        .dislike-container {
            font-size: 60px;
            animation: shake 0.5s infinite;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 МЕЖДУНАРОДНАЯ ОЛИМПИАДА 2026 🏆</h1>
        
        <div class="form-group">
            <label>📝 ФИО:</label>
            <input type="text" id="fio" placeholder="Введите ваше ФИО полностью">
        </div>
        
        <div class="form-group">
            <label>📧 Email:</label>
            <input type="email" id="email" placeholder="Введите ваш email">
        </div>
        
        <button onclick="checkWinner()">⭐ УЗНАТЬ РЕЗУЛЬТАТ ⭐</button>
        
        <div id="result" class="result"></div>
    </div>

    <script>
        const WINNER_EMAIL = "Mashapiro192@gmail.com";
        const WINNER_NAME = "Шапиро Мария Александровна";
        const WINNER_PHONE = "8-964-522-66-80";
        
        const prizes = [
            "ПОБЕДИТЕЛЬ",
            "2 МЕСТО",
            "3 МЕСТО",
            "ПРИЗЁР",
            "ТЫ ЛОХ 😂"
        ];
        
        // Функция для создания фанфар (конфетти)
        function createFanfares() {
            const colors = ['gold', 'red', 'blue', 'green', 'purple', 'orange', 'pink', 'yellow'];
            
            for (let i = 0; i < 150; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.width = (Math.random() * 15 + 10) + 'px';
                    confetti.style.height = (Math.random() * 20 + 10) + 'px';
                    confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => {
                        confetti.remove();
                    }, 4000);
                }, i * 20); // Каскадное появление
            }
        }
        
        // Функция для создания дизлайков
        function createDislikes() {
            const dislikes = ['👎', '💩', '🤡', '😡', '💔', '❌', '🤮', '😈'];
            
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const dislike = document.createElement('div');
                    dislike.className = 'dislike';
                    dislike.style.left = Math.random() * 100 + 'vw';
                    dislike.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    dislike.style.fontSize = (Math.random() * 30 + 30) + 'px';
                    dislike.innerHTML = dislikes[Math.floor(Math.random() * dislikes.length)];
                    document.body.appendChild(dislike);
                    
                    setTimeout(() => {
                        dislike.remove();
                    }, 3000);
                }, i * 30);
            }
        }
        
        function checkWinner() {
            const fio = document.getElementById('fio').value.trim();
            const email = document.getElementById('email').value.trim();
            const resultDiv = document.getElementById('result');
            
            if (!fio || !email) {
                alert('Пожалуйста, заполните все поля! 👆');
                return;
            }
            
            // Удаляем старые эффекты
            document.querySelectorAll('.confetti, .dislike').forEach(el => el.remove());
            
            // Проверяем победителя
            if (email === WINNER_EMAIL && fio === WINNER_NAME) {
                // ПОБЕДИТЕЛЬ - всегда первое место
                resultDiv.style.display = 'block';
                resultDiv.className = 'result winner';
                resultDiv.innerHTML = `
                    <div class="emoji-large">🏆👑🏆</div>
                    <div>ПОБЕДИТЕЛЬ</div>
                    <div class="gift-note">
                        Обратитесь за подарком по номеру телефона:<br>
                        <span class="phone-number">${WINNER_PHONE}</span>
                    </div>
                    <div style="margin-top: 20px; font-size: 20px;">✨ АДМИНИСТРАТОР УЖЕ ЗНАЕТ О ВАШЕЙ ПОБЕДЕ ✨</div>
                `;
                // ФАНФАРЫ для победителя
                createFanfares();
                
            } else {
                // Для всех остальных - РАНДОМНЫЙ результат
                const randomIndex = Math.floor(Math.random() * prizes.length);
                const result = prizes[randomIndex];
                
                resultDiv.style.display = 'block';
                
                if (result === "ТЫ ЛОХ 😂") {
                    // ТЫ ЛОХ - с дизлайками и радугой
                    resultDiv.className = 'result loser';
                    resultDiv.innerHTML = `
                        <div class="dislike-container">👎👎👎</div>
                        <div class="rainbow-text">ТЫ ЛОХ</div>
                        <div style="font-size: 60px; margin: 20px 0;">😂🤣😭</div>
                        <div style="font-size: 24px;">ПОПРОБУЙ ЕЩЁ РАЗ!</div>
                    `;
                    // ДИЗЛАЙКИ
                    createDislikes();
                    
                } else if (result === "2 МЕСТО" || result === "3 МЕСТО") {
                    resultDiv.className = 'result prize';
                    resultDiv.innerHTML = `
                        <div class="emoji-large">🎉</div>
                        <div style="font-size: 48px;">${result}</div>
                        <div style="font-size: 24px; margin-top: 15px;">ПОЗДРАВЛЯЕМ!</div>
                    `;
                    // Маленькие фанфары
                    createFanfares();
                    
                } else if (result === "ПРИЗЁР") {
                    resultDiv.className = 'result prize';
                    resultDiv.innerHTML = `
                        <div class="emoji-large">🏅</div>
                        <div style="font-size: 48px;">ПРИЗЁР</div>
                        <div style="font-size: 24px; margin-top: 15px;">ВЫ МОЛОДЕЦ!</div>
                    `;
                    
                } else {
                    // ПОБЕДИТЕЛЬ не может выпасть случайно, но на всякий случай
                    resultDiv.className = 'result prize';
                    resultDiv.innerHTML = `
                        <div class="emoji-large">⭐</div>
                        <div style="font-size: 48px;">${result}</div>
                    `;
                }
            }
            
            // Прокручиваем к результату
            resultDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        
        // Добавляем эффект при нажатии Enter
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkWinner();
            }
        });
    </script>
</body>
</html>
